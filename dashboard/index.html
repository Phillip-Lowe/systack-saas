<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAOS Fleet Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #001a2d;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #001a2d 0%, #002845 100%);
            padding: 30px 40px;
            border-bottom: 1px solid rgba(0,161,219,0.3);
        }
        .header h1 {
            font-size: 28px;
            color: white;
            margin-bottom: 8px;
        }
        .header p {
            color: #94a3b8;
            font-size: 14px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        .card:hover {
            border-color: rgba(0,161,219,0.3);
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        .metric {
            font-size: 36px;
            font-weight: 800;
            color: #00c5e0;
            margin: 8px 0;
        }
        .metric-label {
            font-size: 13px;
            color: #94a3b8;
        }
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .agent-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .agent-emoji {
            font-size: 24px;
        }
        .agent-info {
            flex: 1;
        }
        .agent-name {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }
        .agent-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-idle { background: #22c55e; }
        .status-busy { background: #f59e0b; }
        .status-error { background: #ef4444; }
        .status-offline { background: #64748b; }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .refresh-btn {
            background: #00a1db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-left: auto;
        }
        .refresh-btn:hover { background: #007da9; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 16px;
            border-radius: 8px;
            color: #ef4444;
        }
        .clients-table {
            width: 100%;
            border-collapse: collapse;
        }
        .clients-table th,
        .clients-table td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .clients-table th {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .clients-table td {
            font-size: 14px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-active { background: rgba(34,197,94,0.2); color: #22c55e; }
        .status-deployed { background: rgba(0,161,219,0.2); color: #00c5e0; }
        .timestamp {
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛰️ SAOS Fleet Command</h1>
        <p>Your agent fleet, monitored in real-time</p>
    </div>

    <div class="container">
        <!-- Metrics Cards -->
        <div class="grid" id="metrics">
            <div class="loading">Loading fleet status...</div>
        </div>

        <!-- Agents Grid -->
        <div class="section-title">
            🤖 Fleet Agents
            <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
        </div>
        <div class="agents-grid" id="agents">
            <div class="loading">Loading agents...</div>
        </div>

        <!-- Clients Table -->
        <div class="section-title" style="margin-top: 30px;">
            👥 SAOS Clients
        </div>
        <div id="clients">
            <div class="loading">Loading clients...</div>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8765'; // Dashboard API port

        async function loadData() {
            try {
                const [statusRes, clientsRes] = await Promise.all([
                    fetch(`${API_BASE}/api/status`).catch(() => null),
                    fetch(`${API_BASE}/api/clients`).catch(() => null)
                ]);

                if (!statusRes) {
                    document.getElementById('metrics').innerHTML = '<div class="error">Dashboard API not running. Start it with: python3 dashboard/api.py</div>';
                    return;
                }

                const data = await statusRes.json();
                renderMetrics(data);
                renderAgents(data.agents);

                if (clientsRes) {
                    const clients = await clientsRes.json();
                    renderClients(clients);
                }

                document.getElementById('timestamp').textContent = 'Last updated: ' + new Date(data.timestamp).toLocaleString();

            } catch (err) {
                document.getElementById('metrics').innerHTML = '<div class="error">Failed to load: ' + err.message + '</div>';
            }
        }

        function renderMetrics(data) {
            const tasks = data.tasks || {};
            const metrics = [
                { icon: '📋', label: 'Pending Tasks', value: tasks.PENDING || 0, color: '#f59e0b' },
                { icon: '🔄', label: 'Running', value: tasks.RUNNING || 0, color: '#00c5e0' },
                { icon: '✅', label: 'Completed', value: tasks.DONE || 0, color: '#22c55e' },
                { icon: '👥', label: 'SAOS Clients', value: (data.clients || []).length, color: '#8b5cf6' }
            ];

            document.getElementById('metrics').innerHTML = metrics.map(m => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon" style="background: ${m.color}20; color: ${m.color}">${m.icon}</div>
                        <div class="card-title">${m.label}</div>
                    </div>
                    <div class="metric" style="color: ${m.color}">${m.value}</div>
                </div>
            `).join('');
        }

        function renderAgents(agents) {
            if (!agents || agents.length === 0) {
                document.getElementById('agents').innerHTML = '<div class="loading">No agents found</div>';
                return;
            }

            const emojiMap = {
                'SOL': '🛰️', 'CODY': '💻', 'ASSEMBLY': '🛠️', 'VALI': '✅',
                'PESSI': '⚠️', 'ORACLE': '🔮', 'ATLAS': '🗺️', 'CHATTY': '💬',
                'GENI': '🎨', 'JURIS': '⚖️'
            };

            document.getElementById('agents').innerHTML = agents.map(a => {
                const statusClass = a.status === 'IDLE' ? 'status-idle' :
                                  a.status === 'BUSY' ? 'status-busy' :
                                  a.status === 'ERROR' ? 'status-error' : 'status-offline';
                const taskInfo = a.current_task_id ? ` (task #${a.current_task_id})` : '';
                return `
                    <div class="agent-card">
                        <div class="agent-emoji">${emojiMap[a.agent_name] || '🔹'}</div>
                        <div class="agent-info">
                            <div class="agent-name">${a.agent_name}</div>
                            <div class="agent-status">
                                <span class="status-dot ${statusClass}"></span>
                                ${a.status}${taskInfo}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderClients(clients) {
            if (!clients || clients.length === 0) {
                document.getElementById('clients').innerHTML = '<div class="loading">No clients yet</div>';
                return;
            }

            const statusClass = s => {
                if (s === 'active') return 'status-active';
                if (s === 'deployed') return 'status-deployed';
                return 'status-pending';
            };

            document.getElementById('clients').innerHTML = `
                <table class="clients-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Business</th>
                            <th>Email</th>
                            <th>Tier</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${clients.map(c => `
                            <tr>
                                <td>${c.id}</td>
                                <td>${c.customer_name}</td>
                                <td>${c.customer_email}</td>
                                <td>${c.tier}</td>
                                <td><span class="status-badge ${statusClass(c.vps_status)}">${c.vps_status || 'pending'}</span></td>
                                <td>${new Date(c.created_at).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Load on page load
        loadData();
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
